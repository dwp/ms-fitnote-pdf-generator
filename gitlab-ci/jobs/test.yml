########################################################################################
###    Jobs to test built code                                                       ###
########################################################################################

### ENVIRONMENT
.environment: &environment
  environment:
    name: "$ENVIRONMENT"
    action: prepare

### TRIGGERS
.component-test: &component-test
  rules:
    - if: $BUILD_TYPE

maven-cucumber:
  extends: .docker-compose-run-template
  image: nexus.nonprod.dwpcloud.uk/docker/docker:29.4.0@sha256:a6dd5322747a95cd8e3207bd8d415a8fd20ec34e9c00f06dc019cbd912013489
  stage: code-test
  variables:
    DOCKER_COMPOSE_FILE: "docker-compose.yml"
    DOCKER_COMPOSE_COMMAND: "--exit-code-from pdf-tests"
  before_script:
    - echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
  <<: *component-test
