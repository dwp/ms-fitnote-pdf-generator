########################################################################################
###    Jobs to test built code                                                       ###
########################################################################################

### ENVIRONMENT
.environment: &environment
  environment:
    name: "$ENVIRONMENT"
    action: prepare

### TRIGGERS
.component-test: &component-test
  rules:
    - if: $BUILD_TYPE

maven-cucumber:
  extends: .docker-compose-run-template
  image: nexus.nonprod.dwpcloud.uk/docker/docker:29.0.4@sha256:c9699f4fc7365e8daad3eb48ce3b62dc118b2a5267f7be7bcd3c4e4b2f1cfb4c
  stage: code-test
  variables:
    DOCKER_COMPOSE_FILE: "docker-compose.yml"
    DOCKER_COMPOSE_COMMAND: "--exit-code-from pdf-tests"
  before_script:
    - echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
  <<: *component-test
