########################################################################################
###    Jobs specific to docker builds                                                ###
###      - linting                                                                   ###
###      - image build                                                               ###
###      - image test                                                                ###
###      - image push                                                                ###
########################################################################################

### TRIGGERS
.docker-build: &docker-build
  rules:
    - if: $BUILD_TYPE

.docker-not-merge: &docker-not-merge
  rules:
    - if: $BUILD_TYPE && $MERGE_TO_DEVELOP == null

.docker-build-only-prod: &docker-build-only-prod
  rules:
    - if: $BUILD_TYPE && $PROD_RELEASE == "true"
  environment:
    name: "prodacct"
    action: prepare

### LINT
docker-lint:
  extends: .docker-lint-template
  <<: *docker-not-merge
  needs: []

### BUILD
docker-build:
  extends: .docker-build-template
  before_script:
    - echo $DT_API_TOKEN_SAAS | docker login -u eyq18885 --password-stdin https://eyq18885.live.dynatrace.com
  variables:
    ADD_LATEST_TAG: "true"
    IMAGE_PLATFORM: "linux/amd64" # Can't do multi-arch build because of Dynatrace
    DOCKER_CLI_ARGS: "--build-arg GITLAB_REGISTRY_TOKEN=${GITLAB_REGISTRY_TOKEN}"
  <<: *docker-build
  needs: [maven-package]

trivy-container:
  extends: .trivy-container-base
  image: nexus.nonprod.dwpcloud.uk/docker/docker:latest@sha256:40916fb078cdd27640d069bba401324a15a06d3ecbd8895048122c8d321f43f8
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
  <<: *docker-build
  needs: [docker-build]

container-test-command:
  image: nexus.nonprod.dwpcloud.uk/docker/docker:latest@sha256:40916fb078cdd27640d069bba401324a15a06d3ecbd8895048122c8d321f43f8
  extends: .container-test-template
  <<: *docker-build
  needs: [docker-build]

### IMAGE PUSH
push-to-ecr-nonprodaws:
  extends:
    - .setup-id-token
    - .acquire-oidc-credentials
    - .push-to-ecr
  variables:
    ACCOUNT_ID: $NONPROD_SHARED_ACCOUNT_ID
    ASSUME_ROLE_ACCOUNT_ID: $NONPROD_SHARED_ACCOUNT_ID
  <<: *docker-build

push-to-ecr-prodaws:
  extends:
    - .setup-id-token
    - .acquire-oidc-credentials
    - .push-to-ecr
  variables:
    ACCOUNT_ID: $PROD_SHARED_ACCOUNT_ID
    ASSUME_ROLE_ACCOUNT_ID: $PROD_SHARED_ACCOUNT_ID
  <<: *docker-build-only-prod

dwp-place-change-verification-trigger:
  variables:
    ASSUME_ROLE_ACCOUNT_ID: $PROD_SHARED_ACCOUNT_ID
  <<: *docker-build-only-prod
