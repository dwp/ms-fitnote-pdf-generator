########################################################################################
###    Jobs specific to maven projects including:                                    ###
###      - post fragment updated versions to slack channel                           ###
###      - post maven updated versions to slack channel                           ###
########################################################################################

.merge-to-develop: &merge-to-develop
  rules:
    - if: $MERGE_TO_DEVELOP == "true"

### post fragment updated versions to slack channel
fragment-messages:
  image: nexus.nonprod.dwpcloud.uk/docker/bash:5@sha256:32ca1653c68dd414bbdcdb9d5dc811010022b04e37bfcc886a5d052fc0c56656
  tags:
    - dwp-aws-x86-linux-l
  <<: *merge-to-develop
  stage: slack-push
  when: manual
  allow_failure: true
  #  needs: []
  variables:
    FRAGMENT_INCLUDE_PATH: "$CI_PROJECT_DIR/gitlab-ci/config/fragments.yml"
  before_script:
    - sed -i "s|https*://dl-cdn.alpinelinux.org|https://nexus.nonprod.dwpcloud.uk/repository|" /etc/apk/repositories
    - apk --update add git bash util-linux wget curl
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com".insteadOf "ssh://git@gitlab.com"
  script:
    - wget --quiet https://github.com/mikefarah/yq/releases/download/v4.33.3/yq_linux_amd64
    - chmod +x yq_linux_amd64
    - PATH=$PATH:$PWD
    - mv yq_linux_amd64 yq
    - yq --version
    - ./scripts/fragmentsToSlack.sh

maven-messages:
  image: ${MAVEN_IMAGE}
  tags:
    - dwp-aws-x86-linux-l-dind
  <<: *merge-to-develop
  stage: slack-push
  needs: [fragment-messages]
  allow_failure: true
  variables:
    POM_INCLUDE_PATH: "$CI_PROJECT_DIR/pom.xml"
  before_script:
    - apt-get update -y && apt-get install -y curl
  script:
    - ./scripts/mavenToSlack.sh
