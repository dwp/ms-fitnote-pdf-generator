########################################################################################
###    Jobs to assert the quality of commited code                                   ###
########################################################################################

### TRIGGERS
.build: &build
  rules:
    - if: $BUILD_TYPE

.build-not-merge: &build-not-merge
  rules:
    - if: $BUILD_TYPE && $MERGE_TO_DEVELOP == null

### CHECKS
todo-check:
  extends: .todo-check-template
  <<: *build
  needs: []

shell-check:
  extends: .shell-check-template
  <<: *build-not-merge
  needs: []

